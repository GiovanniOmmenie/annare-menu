<!DOCTYPE html>
<html lang="it">
<head>

  <title>Menù · Pizzeria Annarè</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --dark:       #1C1914;
      --dark-soft:  #272119;
      --bg:         #FDFAF5;
      --card:       #FFFFFF;
      --text:       #1C1410;
      --muted:      #8A7A6E;
      --accent:     #C4392A;
      --border:     #EDE3D8;
      --radius:     14px;
      --shadow:     0 2px 10px rgba(40,20,5,.08);
      --shadow-hv:  0 8px 28px rgba(40,20,5,.16);
      --tab-h:      68px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HERO ─────────────────────────────────────────── */
    .hero {
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 20px 6px;
      position: relative;
      overflow: hidden;
    }

    .hero::before { display: none; }

    .hero-logo {
      width: 72vw;
      height: auto;
      max-width: 300px;
      object-fit: contain;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 18px rgba(0,0,0,.45));
    }
    @media (min-width: 600px) {
      .hero-logo { width: 52vw; max-width: 340px; }
    }
    @media (min-width: 1024px) {
      .hero-logo { width: 300px; max-width: 300px; }
    }

    /* ── TAB BAR ──────────────────────────────────────── */
    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .tab-scroller {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 0 8px;
    }
    .tab-scroller::-webkit-scrollbar { display: none; }

    @media (min-width: 1024px) {
      .tab-scroller {
        justify-content: center;
        overflow-x: visible;
      }
    }

    .tab {
      flex-shrink: 0;
      height: var(--tab-h);
      padding: 0 15px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      color: rgba(255,255,255,.45);
      white-space: nowrap;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .18s, border-color .18s;
      line-height: var(--tab-h);
    }
    .tab.active {
      color: #FFFFFF;
      border-bottom-color: rgba(255,255,255,.75);
      font-weight: 600;
    }

    /* ── LAYOUT ───────────────────────────────────────── */
    .menu-wrap {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 14px 80px;
    }
    @media (min-width: 640px)  { .menu-wrap { padding: 0 20px 80px; } }
    @media (min-width: 1024px) { .menu-wrap { padding: 0 32px 80px; } }

    /* ── SECTION ──────────────────────────────────────── */
    .cat-section { padding-top: 36px; }
    .cat-header   { margin-bottom: 18px; }

    .cat-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 3.5vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .cat-rule {
      width: 36px;
      height: 3px;
      background: var(--dark);
      border-radius: 2px;
      margin-top: 7px;
      opacity: .6;
    }

    /* ── GRID ─────────────────────────────────────────── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 540px)  { .items-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
    @media (min-width: 900px)  { .items-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; } }
    @media (min-width: 1200px) { .items-grid { grid-template-columns: repeat(5, 1fr); } }

    /* ── CARD ─────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .22s ease, box-shadow .22s ease;
      will-change: transform;
      opacity: 0;
      transform: translateY(14px);
    }
    .card.visible { animation: cardIn .38s ease forwards; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-hv);
      }
    }

    .card-thumb {
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #F2E8DA 0%, #E6D3BC 100%);
      overflow: hidden;
      position: relative;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .35s;
    }
    .card-thumb img.loaded { opacity: 1; }

    .card-thumb-icon { display: none; }

    .card-body { padding: 11px 12px 14px; }

    /* badge */
    .item-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      margin-bottom: 5px;
    }
    .b-bianco   { background: #FFF5D6; color: #7A5C0A; }
    .b-rosso    { background: #FCEAEA; color: #9E2A1C; }
    .b-rose     { background: #FDE8EE; color: #A0325A; }
    .b-birra    { background: #FFF0DB; color: #7A4E0A; }
    .b-liquore  { background: #EDE8F8; color: #4E3580; }
    .b-cocktail { background: #E4F4EE; color: #1A6E50; }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.9375rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.725rem;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 8px;
    }

    .card-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);

    /* ── FOOTER ───────────────────────────────────────── */

/* ─────────────────────────────── BUILD DOM ─────────────────────────────── */
function buildMenu() {
  const scroller = document.getElementById('tabScroller');
  const wrap     = document.getElementById('menuWrap');

  MENU.forEach(cat => {

    /* TAB */
    const tab = document.createElement('button');
    tab.className   = 'tab';
    tab.textContent = cat.title;
    tab.dataset.id  = cat.id;
    tab.setAttribute('role', 'tab');
    tab.addEventListener('click', () => goToSection(cat.id));
    scroller.appendChild(tab);

    /* SECTION */
    const sec = document.createElement('section');
    sec.className         = 'cat-section';
    sec.id                = cat.id;
    sec.dataset.sectionId = cat.id;
    sec.innerHTML = `<div class="cat-header"><h2 class="cat-title">${cat.title}</h2><div class="cat-rule"></div></div>`;

    const grid = document.createElement('div');
    grid.className = 'items-grid';
    cat.items.forEach((item, i) => grid.appendChild(buildCard(item, cat.icon, i)));
    sec.appendChild(grid);

    wrap.appendChild(sec);
  });
}

function buildCard(item, icon, idx) {
  const card = document.createElement('article');
  card.className = 'card';
  card.style.animationDelay = Math.min(idx * 45, 360) + 'ms';

  /* thumb */
  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';

  const fallback = document.createElement('div');
  fallback.className   = 'card-thumb-icon';
  fallback.textContent = icon;
  thumb.appendChild(fallback);

  if (item.img) {
    const img = document.createElement('img');
    img.alt        = item.name;
    img.dataset.src = item.img;
    img.onload     = () => img.classList.add('loaded');
    img.onerror    = () => { img.style.display = 'none'; };
    thumb.appendChild(img);
  }

  /* body */
  const body = document.createElement('div');
  body.className = 'card-body';
  let html = '';
  if (item.badge) html += `<div class="item-badge b-${item.badge}">${BADGE[item.badge]}</div>`;
  html += `<div class="card-name">${item.name}</div>`;
  if (item.desc) html += `<div class="card-desc">${item.desc}</div>`;
  html += `<div class="card-price">€ ${item.price}</div>`;
  body.innerHTML = html;

  card.appendChild(thumb);
  card.appendChild(body);
  return card;
}

/* ─────────────────────────────── SCROLL ────────────────────────────────── */
function goToSection(id) {
  const el   = document.getElementById(id);
  const tabH = document.getElementById('tabBar').offsetHeight;
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.scrollY - tabH - 6;
  window.scrollTo({ top, behavior: 'smooth' });
}

/* ─────────────────────────────── ACTIVE TAB ────────────────────────────── */
function setupObserver() {
  const tabH = document.getElementById('tabBar').offsetHeight;
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const id = e.target.dataset.sectionId;
      document.querySelectorAll('.tab').forEach(t => {
        const active = t.dataset.id === id;
        t.classList.toggle('active', active);
        if (active) t.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      });
    });
  }, { rootMargin:`-${tabH + 2}px 0px -55% 0px`, threshold:0 });
  document.querySelectorAll('.cat-section').forEach(s => obs.observe(s));
}

/* ─────────────────────────────── LAZY IMG ──────────────────────────────── */
function setupLazy() {
  const obs = new IntersectionObserver((entries, o) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const img = e.target;
      if (img.dataset.src) { img.src = img.dataset.src; delete img.dataset.src; }
      o.unobserve(img);
    });
  }, { rootMargin:'200px' });
  document.querySelectorAll('img[data-src]').forEach(img => obs.observe(img));
}

/* ─────────────────────────────── CARD REVEAL ───────────────────────────── */
function setupReveal() {
  const obs = new IntersectionObserver((entries, o) => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      e.target.classList.add('visible');
      o.unobserve(e.target);
    });
  }, { rootMargin:'0px 0px -40px 0px', threshold:0.05 });
  document.querySelectorAll('.card').forEach(c => obs.observe(c));
}

/* ─────────────────────────────── INIT ──────────────────────────────────── */
buildMenu();
setupObserver();
setupLazy();
setupReveal();
document.querySelector('.tab')?.classList.add('active');
</script>
